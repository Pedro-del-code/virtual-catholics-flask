<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Virtual Catholics</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--gold:#c8a050;--gold-light:#f5d78e;--gold-dark:#8b6820;--cream:#faf6ef;--dark:#0d0a05;}
*{margin:0;padding:0;box-sizing:border-box;}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;overflow:hidden;position:relative;}

/* Fundo */
.bg-img{position:fixed;inset:0;background-size:cover;background-position:center;transition:background-image .4s;}
.bg-overlay{position:fixed;inset:0;transition:background .4s;}

/* Estrelas */
.star{position:fixed;width:2px;height:2px;border-radius:50%;animation:twinkle var(--d) ease-in-out infinite var(--delay);z-index:1;}
@keyframes twinkle{0%,100%{opacity:.2}50%{opacity:1}}

/* Botão modo */
.btn-mode{position:fixed;top:16px;right:16px;z-index:20;background:rgba(0,0,0,.3);border:1px solid rgba(200,160,80,.4);border-radius:2px;color:var(--gold-light);font-size:11px;padding:6px 12px;cursor:pointer;font-family:'Cinzel',serif;letter-spacing:1px;transition:all .2s;backdrop-filter:blur(4px);}
.btn-mode:hover{background:rgba(0,0,0,.5);color:var(--gold);}

/* Container do form - sem card */
.container{position:relative;z-index:10;width:360px;padding:20px;display:flex;flex-direction:column;align-items:center;}

.logo-area{text-align:center;margin-bottom:28px;}
.cross{font-size:32px;color:var(--gold);display:block;text-shadow:0 0 30px rgba(200,160,80,.8),0 0 60px rgba(200,160,80,.4);margin-bottom:8px;}
.logo-title{font-family:'Cinzel',serif;font-size:24px;font-weight:600;letter-spacing:4px;text-transform:uppercase;color:var(--gold-light);text-shadow:0 2px 20px rgba(0,0,0,.8),0 0 40px rgba(200,160,80,.3);}
.logo-sub{font-size:11px;color:rgba(245,215,142,.7);letter-spacing:4px;text-transform:uppercase;margin-top:6px;text-shadow:0 1px 8px rgba(0,0,0,.9);}

/* Tabs */
.tabs{display:flex;width:100%;border-bottom:1px solid rgba(200,160,80,.3);margin-bottom:20px;}
.tab{flex:1;padding:10px;text-align:center;font-family:'Cinzel',serif;font-size:11px;letter-spacing:2px;color:rgba(245,215,142,.5);cursor:pointer;transition:all .3s;border-bottom:2px solid transparent;margin-bottom:-1px;text-shadow:0 1px 6px rgba(0,0,0,.8);}
.tab.active{color:var(--gold-light);border-bottom-color:var(--gold);}

.form{display:none;width:100%;}.form.active{display:block;}

/* Inputs com fundo semi-transparente */
.input-group{position:relative;margin-bottom:12px;}
.input-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:rgba(200,160,80,.6);font-size:14px;z-index:1;}
input{width:100%;padding:13px 14px 13px 38px;background:rgba(0,0,0,.45);backdrop-filter:blur(8px);border:1px solid rgba(200,160,80,.3);border-radius:2px;color:var(--gold-light);font-family:'Cormorant Garamond',serif;font-size:15px;outline:none;transition:all .3s;}
input::placeholder{color:rgba(200,160,80,.4);}
input:focus{border-color:var(--gold);background:rgba(0,0,0,.6);}

.btn-main{width:100%;padding:14px;background:linear-gradient(135deg,var(--gold-dark),var(--gold));border:none;border-radius:2px;color:var(--dark);font-family:'Cinzel',serif;font-size:12px;font-weight:600;letter-spacing:3px;text-transform:uppercase;cursor:pointer;transition:all .3s;margin-top:6px;}
.btn-main:hover{background:linear-gradient(135deg,var(--gold),var(--gold-light));box-shadow:0 4px 20px rgba(200,160,80,.4);}

.divider{display:flex;align-items:center;gap:12px;margin:16px 0;width:100%;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(200,160,80,.2);}
.divider span{font-size:11px;color:rgba(200,160,80,.5);letter-spacing:2px;}

.btn-google{width:100%;padding:12px;background:rgba(0,0,0,.4);backdrop-filter:blur(8px);border:1px solid rgba(200,160,80,.25);border-radius:2px;color:var(--gold-light);font-family:'Cormorant Garamond',serif;font-size:15px;cursor:pointer;transition:all .3s;display:flex;align-items:center;justify-content:center;gap:10px;text-decoration:none;}
.btn-google:hover{border-color:rgba(200,160,80,.6);background:rgba(0,0,0,.6);}
.btn-google img{width:18px;height:18px;}

.lang-sel{display:flex;justify-content:center;gap:6px;margin-bottom:20px;}
.lang-btn{background:rgba(0,0,0,.35);backdrop-filter:blur(4px);border:1px solid rgba(200,160,80,.2);border-radius:2px;color:rgba(200,160,80,.6);font-size:11px;padding:4px 8px;cursor:pointer;transition:all .2s;font-family:'Cinzel',serif;}
.lang-btn.active,.lang-btn:hover{border-color:var(--gold);color:var(--gold);}

.erro{background:rgba(120,0,0,.5);backdrop-filter:blur(8px);border:1px solid rgba(180,40,40,.4);border-radius:2px;padding:10px 14px;font-size:13px;color:#ff9090;margin-bottom:12px;display:none;width:100%;}
.erro.show{display:block;}

.footer{text-align:center;margin-top:20px;font-size:12px;color:rgba(200,160,80,.4);letter-spacing:1px;font-style:italic;text-shadow:0 1px 6px rgba(0,0,0,.9);}

/* Modo claro — overlay bem leve, inputs mais claros */
body.light .bg-overlay{background:rgba(255,248,235,.15);}
body.light input{background:rgba(255,255,255,.25);color:#2a1a08;}
body.light input::placeholder{color:rgba(100,70,20,.5);}
body.light input:focus{background:rgba(255,255,255,.4);}
body.light .btn-google{background:rgba(255,255,255,.2);color:#5a3a10;}
body.light .lang-btn{background:rgba(255,255,255,.2);color:rgba(139,104,32,.7);}
body.light .tab{color:rgba(139,104,32,.6);}
body.light .tab.active{color:var(--gold-dark);}
body.light .logo-title{color:var(--gold-dark);text-shadow:0 2px 20px rgba(255,255,255,.6);}
body.light .logo-sub{color:rgba(139,104,32,.8);}
body.light .btn-mode{background:rgba(255,255,255,.3);color:var(--gold-dark);}

/* Modo escuro — overlay escuro suave */
body.dark .bg-overlay{background:rgba(0,0,0,.3);}
body.dark .star{background:rgba(245,215,142,.7);}
</style>
</head>
<body id="body" class="dark">
<div class="bg-img" id="bgImg"></div>
<div class="bg-overlay"></div>
<div id="starsContainer"></div>
<button class="btn-mode" id="btnMode" onclick="toggleModo()">☀️ Modo Claro</button>

<div class="container">
  <div class="logo-area">
    <span class="cross">✝</span>
    <div class="logo-title">Virtual Catholics</div>
    <div class="logo-sub">{{ T.subtitulo }}</div>
  </div>
  <div class="lang-sel">
    <button class="lang-btn {% if idioma=='pt' %}active{% endif %}" onclick="setLang('pt')">🇧🇷 PT</button>
    <button class="lang-btn {% if idioma=='en' %}active{% endif %}" onclick="setLang('en')">🇺🇸 EN</button>
    <button class="lang-btn {% if idioma=='es' %}active{% endif %}" onclick="setLang('es')">🇪🇸 ES</button>
    <button class="lang-btn {% if idioma=='it' %}active{% endif %}" onclick="setLang('it')">🇮🇹 IT</button>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="trocarAba('entrar')" id="tab-entrar">{{ T.entrar }}</div>
    <div class="tab" onclick="trocarAba('criar')" id="tab-criar">{{ T.criar_conta }}</div>
  </div>
  <div id="erro" class="erro"></div>
  <div class="form active" id="form-entrar">
    <div class="input-group"><span class="input-icon">👤</span><input type="text" id="login-user" placeholder="Usuário"></div>
    <div class="input-group"><span class="input-icon">🔒</span><input type="password" id="login-senha" placeholder="Senha"></div>
    <button class="btn-main" id="btn-entrar" onclick="fazerLogin()">✝ &nbsp; {{ T.entrar }}</button>
    <div class="divider"><span>ou</span></div>
    <a href="/auth/google" class="btn-google"><img src="https://www.google.com/favicon.ico" alt="G"> Google</a>
  </div>
  <div class="form" id="form-criar">
    <div class="input-group"><span class="input-icon">🙏</span><input type="text" id="reg-nome" placeholder="Nome"></div>
    <div class="input-group"><span class="input-icon">👤</span><input type="text" id="reg-user" placeholder="Usuário"></div>
    <div class="input-group"><span class="input-icon">🔒</span><input type="password" id="reg-senha" placeholder="Senha"></div>
    <button class="btn-main" id="btn-criar" onclick="criarConta()">✝ &nbsp; {{ T.criar_conta }}</button>
    <div class="divider"><span>ou</span></div>
    <a href="/auth/google" class="btn-google"><img src="https://www.google.com/favicon.ico" alt="G"> Google</a>
  </div>
  <div class="footer">Que Deus te abencoe ✦ Paz e Bem!</div>
</div>

<script>
let idioma='{{ idioma }}';
const IMG_ESCURA = "{{ url_for('static', filename='maria_escura.png') }}";
const IMG_CLARA = "{{ url_for('static', filename='maria_clara.png') }}";

// Estrelas
const sc = document.getElementById('starsContainer');
for(let i=0;i<50;i++){
  const s=document.createElement('div');
  s.className='star';
  s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${2+Math.random()*4}s;--delay:${Math.random()*4}s`;
  sc.appendChild(s);
}

let modoEscuro = localStorage.getItem('modo') !== 'claro';
aplicarModo();

function aplicarModo() {
  const body = document.getElementById('body');
  const btn = document.getElementById('btnMode');
  const bg = document.getElementById('bgImg');
  if (modoEscuro) {
    body.className = 'dark';
    bg.style.backgroundImage = `url('${IMG_ESCURA}')`;
    btn.textContent = '☀️ Modo Claro';
  } else {
    body.className = 'light';
    bg.style.backgroundImage = `url('${IMG_CLARA}')`;
    btn.textContent = '🌙 Modo Escuro';
  }
}

function toggleModo() {
  modoEscuro = !modoEscuro;
  localStorage.setItem('modo', modoEscuro ? 'escuro' : 'claro');
  aplicarModo();
}

function setLang(l){window.location.href='/login?lang='+l;}

function trocarAba(a){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',(i===0)===(a==='entrar')));
  document.getElementById('form-entrar').classList.toggle('active',a==='entrar');
  document.getElementById('form-criar').classList.toggle('active',a==='criar');
  document.getElementById('erro').classList.remove('show');
}

function mostrarErro(m){const e=document.getElementById('erro');e.textContent=m;e.classList.add('show');}

async function fazerLogin(){
  const u=document.getElementById('login-user').value.trim();
  const s=document.getElementById('login-senha').value.trim();
  if(!u||!s){mostrarErro('Preencha todos os campos!');return;}
  document.getElementById('erro').classList.remove('show');
  const btn=document.getElementById('btn-entrar');
  btn.textContent='...'; btn.disabled=true;
  try{
    const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,senha:s,idioma})});
    const d=await r.json();
    if(d.ok)window.location.href='/';
    else mostrarErro(d.erro);
  }catch(e){mostrarErro('Erro de conexão. Tente novamente.');}
  btn.innerHTML='✝ &nbsp; {{ T.entrar }}'; btn.disabled=false;
}

async function criarConta(){
  const n=document.getElementById('reg-nome').value.trim();
  const u=document.getElementById('reg-user').value.trim();
  const s=document.getElementById('reg-senha').value.trim();
  if(!n||!u||!s){mostrarErro('Preencha todos os campos!');return;}
  document.getElementById('erro').classList.remove('show');
  const btn=document.getElementById('btn-criar');
  btn.textContent='...'; btn.disabled=true;
  try{
    const r=await fetch('/api/registro',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({nome:n,username:u,senha:s,idioma})});
    const d=await r.json();
    if(d.ok)window.location.href='/';
    else mostrarErro(d.erro);
  }catch(e){mostrarErro('Erro de conexão. Tente novamente.');}
  btn.innerHTML='✝ &nbsp; {{ T.criar_conta }}'; btn.disabled=false;
}

document.addEventListener('keydown',e=>{
  if(e.key==='Enter'){
    if(document.getElementById('form-entrar').classList.contains('active'))fazerLogin();
    else criarConta();
  }
});
</script>
</body>
</html>

.particles{position:fixed;inset:0;z-index:2;pointer-events:none;overflow:hidden}
.particle{position:absolute;border-radius:50%;background:var(--gold);opacity:0;animation:float-up linear infinite}
@keyframes float-up{
  0%{opacity:0;transform:translateY(0) scale(.5)}
  15%{opacity:.5}85%{opacity:.25}
  100%{opacity:0;transform:translateY(-100vh) scale(1.2)}
}
.wrap{position:relative;z-index:10;width:100%;max-width:385px;animation:fadeUp .7s cubic-bezier(.16,1,.3,1) both}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.card{
  background:var(--glass-bg);border:1px solid var(--glass-border);border-radius:24px;
  padding:44px 36px 36px;
  backdrop-filter:blur(22px) saturate(1.4);-webkit-backdrop-filter:blur(22px) saturate(1.4);
  box-shadow:var(--shadow),inset 0 1px 0 rgba(255,255,255,.08);
}
.top{text-align:center;margin-bottom:32px}
.cross{display:inline-block;font-size:34px;color:var(--gold);margin-bottom:14px;
  filter:drop-shadow(0 0 12px rgba(201,168,76,.7));
  animation:glow-pulse 3s ease-in-out infinite}
@keyframes glow-pulse{
  0%,100%{filter:drop-shadow(0 0 8px rgba(201,168,76,.5))}
  50%{filter:drop-shadow(0 0 22px rgba(232,201,122,.9))}
}
.title{font-family:'Cinzel',serif;font-size:22px;font-weight:600;letter-spacing:2.5px;
  color:var(--white);margin-bottom:6px;text-shadow:0 0 30px rgba(201,168,76,.4)}
.subtitle{font-size:14px;font-style:italic;color:var(--gold-light);letter-spacing:.5px;opacity:.85}
.divider-top{width:50px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:14px auto 0;opacity:.6}
.erro{background:rgba(160,30,30,.15);border:1px solid rgba(180,60,60,.35);border-radius:10px;
  color:#ffaaaa;font-size:14px;padding:11px 14px;margin-bottom:14px;display:none}
.erro.show{display:block}
.fields{display:flex;flex-direction:column;gap:13px;margin-bottom:8px}
.field{position:relative}
.field input{
  width:100%;padding:15px 18px;
  background:var(--input-bg);border:1px solid rgba(201,168,76,.20);border-radius:12px;
  color:var(--white);font-family:'Cormorant Garamond',serif;font-size:17px;outline:none;transition:all .25s;
}
.field input::placeholder{color:rgba(253,250,244,.35)}
.field input:focus{
  border-color:var(--gold);background:rgba(255,252,245,.14);
  box-shadow:0 0 0 3px rgba(201,168,76,.12),0 0 20px rgba(201,168,76,.08);
}
.eye{position:absolute;right:16px;top:50%;transform:translateY(-50%);
  color:rgba(201,168,76,.55);cursor:pointer;font-size:15px;transition:color .2s;user-select:none}
.eye:hover{color:var(--gold)}
.forgot{display:block;text-align:right;margin-bottom:22px;margin-top:5px;
  font-style:italic;font-size:13.5px;color:var(--gold-light);opacity:.8;text-decoration:none;transition:opacity .2s}
.forgot:hover{opacity:1}
.btn-main{
  width:100%;padding:15px;
  background:linear-gradient(135deg,#C9A84C 0%,#E8C97A 50%,#C9A84C 100%);
  background-size:200% 100%;
  border:none;border-radius:12px;color:#1a1208;
  font-family:'Cinzel',serif;font-size:12px;font-weight:600;letter-spacing:3px;
  cursor:pointer;box-shadow:0 4px 24px rgba(201,168,76,.35);
  transition:all .3s;margin-bottom:16px;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn-main:hover{background-position:100% 0;box-shadow:0 6px 32px rgba(201,168,76,.55);transform:translateY(-1px)}
.btn-main:active{transform:translateY(0)}
.btn-main.loading{opacity:.6;pointer-events:none}
.or{display:flex;align-items:center;gap:10px;margin-bottom:14px;
  color:rgba(253,250,244,.35);font-size:11px;letter-spacing:2px;font-family:'Cinzel',serif}
.or::before,.or::after{content:'';flex:1;height:1px;
  background:linear-gradient(90deg,transparent,rgba(201,168,76,.25),transparent)}
.btn-google{
  width:100%;padding:13px 18px;
  background:rgba(255,252,245,.05);border:1px solid rgba(201,168,76,.25);border-radius:12px;
  color:var(--white);font-family:'Cinzel',serif;font-size:12px;letter-spacing:1.5px;
  cursor:pointer;transition:all .25s;
  display:flex;align-items:center;justify-content:center;gap:10px;
  backdrop-filter:blur(8px);
}
.btn-google:hover{background:rgba(255,252,245,.10);border-color:rgba(201,168,76,.45);transform:translateY(-1px)}
.btn-google svg{width:18px;height:18px;flex-shrink:0}
.footer-link{text-align:center;margin-top:26px;font-size:15px;color:rgba(253,250,244,.5)}
.footer-link a{color:var(--gold-light);font-weight:500;text-decoration:none;transition:opacity .2s}
.footer-link a:hover{opacity:.75}
.blessing{text-align:center;margin-top:18px;font-style:italic;font-size:12.5px;color:rgba(201,168,76,.35);letter-spacing:.5px}

/* Modal esqueci senha */
.modal-overlay{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal-box{background:rgba(20,14,6,.95);border:1px solid var(--glass-border);border-radius:20px;padding:36px 32px;width:90%;max-width:360px;animation:fadeUp .4s cubic-bezier(.16,1,.3,1) both;text-align:center}
.modal-cross{font-size:24px;color:var(--gold);margin-bottom:12px;filter:drop-shadow(0 0 8px rgba(201,168,76,.6))}
.modal-title{font-family:'Cinzel',serif;font-size:15px;letter-spacing:2px;color:var(--white);margin-bottom:6px}
.modal-sub{font-size:13.5px;font-style:italic;color:rgba(253,250,244,.5);margin-bottom:22px;line-height:1.6}
.modal-input{width:100%;padding:14px 16px;background:var(--input-bg);border:1px solid rgba(201,168,76,.2);border-radius:10px;color:var(--white);font-family:'Cormorant Garamond',serif;font-size:16px;outline:none;margin-bottom:14px;transition:all .25s}
.modal-input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,168,76,.1)}
.modal-input::placeholder{color:rgba(253,250,244,.35)}
.modal-btn{width:100%;padding:13px;background:linear-gradient(135deg,#C9A84C,#E8C97A,#C9A84C);border:none;border-radius:10px;color:#1a1208;font-family:'Cinzel',serif;font-size:11px;letter-spacing:2.5px;cursor:pointer;margin-bottom:10px;transition:all .3s}
.modal-btn:hover{box-shadow:0 4px 20px rgba(201,168,76,.4)}
.modal-btn.loading{opacity:.6;pointer-events:none}
.modal-cancel{font-size:13px;font-style:italic;color:rgba(201,168,76,.5);cursor:pointer;transition:color .2s}
.modal-cancel:hover{color:var(--gold)}
.modal-msg{font-size:13.5px;margin-top:10px;min-height:18px;font-style:italic}
.modal-msg.ok{color:#88cc88}
.modal-msg.err{color:#ffaaaa}
</style>
</head>
<body>
<div class="bg"></div>
<div class="bg-img"></div>
<div class="particles" id="particles"></div>
<div class="wrap">
  <div class="card">
    <div class="top">
      <span class="cross">✝</span>
      <div class="title">Virtual Catholics</div>
      <div class="subtitle">Entre na sua conta</div>
      <div class="divider-top"></div>
    </div>

    <div id="erro" class="erro"></div>

    <div class="fields">
      <div class="field">
        <input type="text" id="login-user" placeholder="Usuário" autocomplete="username">
      </div>
      <div class="field">
        <input type="password" id="login-senha" placeholder="Senha" autocomplete="current-password">
        <span class="eye" onclick="toggleSenha('login-senha',this)">👁</span>
      </div>
    </div>

    <a href="#" class="forgot" onclick="abrirModalSenha();return false">Esqueci minha senha</a>
    <button class="btn-main" id="btn-entrar" onclick="fazerLogin()">✝ &nbsp; {{ T.entrar }}</button>
    <div class="or">ou</div>
    <button class="btn-google" onclick="window.location.href='/auth/google'">
      <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Continuar com Google
    </button>
    <div class="footer-link">Não tem conta? <a href="/register">{{ T.criar_conta }}</a></div>
    <div class="blessing">Que Deus te abençoe &nbsp;✦&nbsp; Paz e Bem</div>
  </div>
</div>
<!-- Modal esqueci minha senha -->
<div class="modal-overlay" id="modalSenha">
  <div class="modal-box">
    <div class="modal-cross">✝</div>
    <div class="modal-title">REDEFINIR SENHA</div>
    <div class="modal-sub">Digite seu e-mail e enviaremos um link para redefinir sua senha.</div>
    <input type="email" id="modal-email" class="modal-input" placeholder="Seu e-mail">
    <button class="modal-btn" id="modal-btn" onclick="enviarRedefinicao()">✝ &nbsp; ENVIAR LINK</button>
    <div class="modal-msg" id="modal-msg"></div>
    <div class="modal-cancel" onclick="fecharModalSenha()">Cancelar</div>
  </div>
</div>
<script>
let idioma='{{ idioma }}';
function mostrarErro(m){const e=document.getElementById('erro');e.textContent=m;e.classList.add('show')}
function limparErro(){document.getElementById('erro').classList.remove('show')}
function abrirModalSenha(){
  document.getElementById('modalSenha').classList.add('show');
  document.getElementById('modal-email').value='';
  document.getElementById('modal-msg').textContent='';
  document.getElementById('modal-msg').className='modal-msg';
  setTimeout(()=>document.getElementById('modal-email').focus(),100);
}
function fecharModalSenha(){
  document.getElementById('modalSenha').classList.remove('show');
}
async function enviarRedefinicao(){
  const email=document.getElementById('modal-email').value.trim();
  const msg=document.getElementById('modal-msg');
  const btn=document.getElementById('modal-btn');
  if(!email){msg.textContent='Digite seu e-mail.';msg.className='modal-msg err';return;}
  btn.textContent='Enviando...';btn.classList.add('loading');
  msg.textContent='';msg.className='modal-msg';
  try{
    const r=await fetch('/api/esqueci-senha',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email})});
    const d=await r.json();
    if(d.ok){
      msg.textContent='Link enviado! Verifique seu e-mail.';msg.className='modal-msg ok';
      btn.style.display='none';
    }else{
      msg.textContent=d.erro||'Erro ao enviar. Tente novamente.';msg.className='modal-msg err';
    }
  }catch(e){msg.textContent='Erro de conexão.';msg.className='modal-msg err';}
  btn.textContent='✝  ENVIAR LINK';btn.classList.remove('loading');
}
// Fechar ao clicar fora
document.getElementById('modalSenha').addEventListener('click',function(e){if(e.target===this)fecharModalSenha();});
(id,el){const inp=document.getElementById(id);inp.type=inp.type==='password'?'text':'password';el.textContent=inp.type==='password'?'👁':'🙈'}
async function fazerLogin(){
  limparErro();
  const u=document.getElementById('login-user').value.trim();
  const s=document.getElementById('login-senha').value;
  if(!u||!s){mostrarErro('{{ T.erro_campos }}');return}
  const btn=document.getElementById('btn-entrar');
  btn.textContent='...';btn.classList.add('loading');
  try{
    const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,senha:s,idioma})});
    const d=await r.json();
    if(d.ok)window.location.href='/';
    else mostrarErro(d.erro);
  }catch(e){mostrarErro('Erro de conexão. Tente novamente.')}
  btn.innerHTML='✝ &nbsp; {{ T.entrar }}';btn.classList.remove('loading');
}
document.addEventListener('keydown',e=>{if(e.key==='Enter')fazerLogin()});

// partículas
const pc=document.getElementById('particles');
for(let i=0;i<20;i++){
  const p=document.createElement('div');p.className='particle';
  const sz=Math.random()*3+1;
  p.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;bottom:${Math.random()*20}%;animation-duration:${8+Math.random()*14}s;animation-delay:${Math.random()*10}s;`;
  pc.appendChild(p);
}
</script>
</body>
</html>

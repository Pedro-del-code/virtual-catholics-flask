<style>
:root { --intro-bg: #fffef8; --intro-text: #5a3a08; --intro-sub: rgba(139,100,20,.55); --intro-ring: rgba(200,160,60,.25); --intro-particle: rgba(200,160,60,.5); --intro-divider: rgba(200,160,60,.5); --intro-quote: #5a3a08; --intro-author: rgba(139,100,20,.6); --intro-footer: rgba(139,100,20,.35); }
.escuro { --intro-bg: #0a0600; --intro-text: #c8a050; --intro-sub: rgba(200,160,80,.5); --intro-ring: rgba(200,160,60,.2); --intro-particle: rgba(200,160,80,.6); --intro-divider: rgba(200,160,60,.4); --intro-quote: #f0e6d0; --intro-author: rgba(200,160,80,.7); --intro-footer: rgba(200,160,80,.4); }
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}

body{
  background: var(--intro-bg);
  font-family:'Cormorant Garamond',serif;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  min-height:100vh;
  position:relative;
}

/* Anéis dourados pulsantes */
.ring{
  position:fixed;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  border-radius:50%;
  border:1.5px solid var(--intro-ring);
  animation:expand 4s ease-out infinite;
  pointer-events:none;
}
.ring:nth-child(1){width:300px;height:300px;animation-delay:0s;}
.ring:nth-child(2){width:300px;height:300px;animation-delay:1.3s;}
.ring:nth-child(3){width:300px;height:300px;animation-delay:2.6s;}

@keyframes expand{
  0%{width:120px;height:120px;opacity:.7;}
  100%{width:600px;height:600px;opacity:0;}
}

/* Partículas */
.particle{
  position:fixed;
  width:3px;height:3px;
  background:var(--intro-particle);
  border-radius:50%;
  pointer-events:none;
  animation:float var(--d) ease-in-out infinite var(--delay);
}
@keyframes float{
  0%,100%{transform:translateY(0) scale(1);opacity:.4;}
  50%{transform:translateY(-30px) scale(1.5);opacity:.9;}
}

/* Container principal */
.container{
  position:relative;z-index:10;
  display:flex;flex-direction:column;
  align-items:center;gap:0;
  opacity:0;
  animation:fadeIn .8s ease forwards .3s;
}
@keyframes fadeIn{to{opacity:1;}}

/* Logo */
.logo-wrap{
  position:relative;
  width:200px;height:200px;
  animation:logoIn 1.2s cubic-bezier(.17,.67,.35,1.3) forwards .2s;
  opacity:0;
  filter:drop-shadow(0 0 30px rgba(200,160,60,.4));
}
@keyframes logoIn{
  0%{opacity:0;transform:scale(.1) rotate(-15deg);}
  70%{opacity:1;transform:scale(1.08) rotate(3deg);}
  100%{opacity:1;transform:scale(1) rotate(0);}
}

.logo-wrap img{
  width:100%;height:100%;
  object-fit:contain;
}

/* Brilho pulsante na logo */
.logo-glow{
  position:absolute;inset:-20px;
  background:radial-gradient(circle, rgba(200,160,60,.2) 0%, transparent 70%);
  border-radius:50%;
  animation:glow 2s ease-in-out infinite;
}
@keyframes glow{
  0%,100%{transform:scale(1);opacity:.6;}
  50%{transform:scale(1.15);opacity:1;}
}

/* Título */
.title{
  font-family:'Cinzel',serif;
  font-size:22px;
  font-weight:700;
  letter-spacing:4px;
  color:var(--intro-text);
  text-transform:uppercase;
  margin-top:16px;
  opacity:0;
  animation:slideUp .7s ease forwards 1.3s;
  text-shadow:0 1px 20px rgba(200,160,60,.3);
}

/* Subtítulo */
.subtitle{
  font-size:12px;
  letter-spacing:5px;
  color:var(--intro-sub);
  text-transform:uppercase;
  margin-top:5px;
  opacity:0;
  animation:slideUp .7s ease forwards 1.6s;
}

@keyframes slideUp{
  0%{opacity:0;transform:translateY(14px);}
  100%{opacity:1;transform:translateY(0);}
}

/* Divisor ornamental */
.divider{
  display:flex;align-items:center;gap:10px;
  margin-top:22px;
  opacity:0;
  animation:slideUp .7s ease forwards 1.9s;
}
.divider-line{
  width:50px;height:1px;
  background:linear-gradient(90deg,transparent,var(--intro-divider));
}
.divider-line.right{
  background:linear-gradient(90deg,var(--intro-divider),transparent);
}
.divider-cross{color:#c8a040;font-size:14px;}

/* Frase do santo */
.quote-wrap{
  max-width:320px;
  text-align:center;
  margin-top:16px;
  opacity:0;
  animation:slideUp .8s ease forwards 2.3s;
  padding:0 20px;
}
.quote-text{
  font-size:16px;
  font-style:italic;
  line-height:1.7;
  color:var(--intro-quote);
}
.quote-author{
  font-family:'Cinzel',serif;
  font-size:11px;
  letter-spacing:2px;
  color:var(--intro-author);
  margin-top:8px;
  text-transform:uppercase;
}

/* Rodapé */
.footer{
  position:fixed;bottom:24px;
  font-size:11px;
  letter-spacing:1px;
  color:var(--intro-footer);
  font-style:italic;
  opacity:0;
  animation:fadeIn .7s ease forwards 3s;
}

/* Fade out completo */
body.fade-out{
  animation:pageFade .8s ease forwards;
}
@keyframes pageFade{
  to{opacity:0;}
}
</style>
{% endblock %}

{% block content %}
<!-- Anéis -->
<div class="ring"></div>
<div class="ring"></div>
<div class="ring"></div>

<div class="container">
  <div class="logo-wrap">
    <div class="logo-glow"></div>

{% block scripts %}
<script>
const frases = [
  {texto:"Senhor, fazeste-nos para Ti, e o nosso coração não descansa enquanto não repousa em Ti.", autor:"Santo Agostinho"},
  {texto:"A oração é a chave da manhã e o trinco da noite.", autor:"Mahatma Gandhi / Atrib. a vários santos"},
  {texto:"Faze o que podes, dá o que tens, sê o que és.", autor:"São Francisco de Sales"},
  {texto:"Não temas, pois eu estou contigo.", autor:"Isaías 41,10"},
  {texto:"A humildade é a mãe de todas as virtudes.", autor:"Santo Agostinho"},
  {texto:"Quem tem Deus nada lhe falta. Só Deus basta.", autor:"Santa Teresa de Ávila"},
  {texto:"Não comeces o dia sem terminar a oração da manhã.", autor:"São João Bosco"},
  {texto:"A fé move montanhas; o amor torna a caminhada suave.", autor:"São Francisco de Assis"},
  {texto:"Deus é amor, e quem permanece no amor permanece em Deus.", autor:"1 João 4,16"},
  {texto:"Pequenas coisas feitas com grande amor se tornam grandes coisas.", autor:"Santa Teresa de Calcutá"},
  {texto:"A paz começa com um sorriso.", autor:"Santa Teresa de Calcutá"},
  {texto:"Senhor, que eu veja!", autor:"São Bartolomeu, cego curado por Jesus"},
  {texto:"Não há maior amor do que dar a vida pelos seus amigos.", autor:"João 15,13"},
  {texto:"A alegria é a rede com a qual se pescam almas.", autor:"Santa Teresa de Calcutá"},
  {texto:"O coração humano foi feito para Deus, e não encontra descanso enquanto não repousa nEle.", autor:"Santo Agostinho"},
  {texto:"Tende coragem! Eu venci o mundo.", autor:"Jesus Cristo — João 16,33"},
  {texto:"Não se turbe o vosso coração, nem se atemorize.", autor:"Jesus Cristo — João 14,27"},
  {texto:"Pai Nosso, que estais no Céu, santificado seja o vosso nome.", autor:"Jesus Cristo — Mateus 6,9"},
  {texto:"A caridade cobre uma multidão de pecados.", autor:"1 Pedro 4,8"},
  {texto:"Sede santos, porque Eu, o Senhor vosso Deus, sou santo.", autor:"Levítico 19,2"},
];

// Partículas
for(let i=0;i<25;i++){
  const p=document.createElement('div');
  p.className='particle';
  p.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${3+Math.random()*5}s;--delay:${Math.random()*4}s;`;
  document.body.appendChild(p);
}

// Pré-carrega imagens de fundo enquanto intro toca
const _img1 = new Image(); _img1.src = '/static/sagrada_escura.png';
const _img2 = new Image(); _img2.src = '/static/sagrada_clara.png';
const _img3 = new Image(); _img3.src = '/static/maria_escura.png';
const _img4 = new Image(); _img4.src = '/static/maria_clara.png';

// Segue preferência do usuário salva no localStorage
if(localStorage.getItem('modo') !== 'claro') document.body.classList.add('escuro');

// Frase aleatória
const f = frases[Math.floor(Math.random()*frases.length)];
document.getElementById('quoteText').textContent = '"' + f.texto + '"';
document.getElementById('quoteAuthor').textContent = '— ' + f.autor;

// Redireciona após 5.5s
setTimeout(()=>{
  document.body.classList.add('fade-out');
  setTimeout(()=>{ window.location.href='/login?from=intro'; }, 800);
}, 5500);
</script>

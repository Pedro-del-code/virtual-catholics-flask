<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Virtual Catholics</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}

body{
  background: linear-gradient(160deg, #fffef8 0%, #fdf6e3 40%, #f8ecc8 100%);
  font-family:'Cormorant Garamond',serif;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  min-height:100vh;
  position:relative;
}

/* Anéis dourados pulsantes */
.ring{
  position:fixed;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  border-radius:50%;
  border:1.5px solid rgba(200,160,60,.25);
  animation:expand 4s ease-out infinite;
  pointer-events:none;
}
.ring:nth-child(1){width:300px;height:300px;animation-delay:0s;}
.ring:nth-child(2){width:300px;height:300px;animation-delay:1.3s;}
.ring:nth-child(3){width:300px;height:300px;animation-delay:2.6s;}

@keyframes expand{
  0%{width:120px;height:120px;opacity:.7;}
  100%{width:600px;height:600px;opacity:0;}
}

/* Partículas */
.particle{
  position:fixed;
  width:3px;height:3px;
  background:rgba(200,160,60,.5);
  border-radius:50%;
  pointer-events:none;
  animation:float var(--d) ease-in-out infinite var(--delay);
}
@keyframes float{
  0%,100%{transform:translateY(0) scale(1);opacity:.4;}
  50%{transform:translateY(-30px) scale(1.5);opacity:.9;}
}

/* Container principal */
.container{
  position:relative;z-index:10;
  display:flex;flex-direction:column;
  align-items:center;gap:0;
  opacity:0;
  animation:fadeIn .8s ease forwards .3s;
}
@keyframes fadeIn{to{opacity:1;}}

/* Logo */
.logo-wrap{
  position:relative;
  width:200px;height:200px;
  animation:logoIn 1.2s cubic-bezier(.17,.67,.35,1.3) forwards .2s;
  opacity:0;
  filter:drop-shadow(0 0 30px rgba(200,160,60,.4));
}
@keyframes logoIn{
  0%{opacity:0;transform:scale(.1) rotate(-15deg);}
  70%{opacity:1;transform:scale(1.08) rotate(3deg);}
  100%{opacity:1;transform:scale(1) rotate(0);}
}

.logo-wrap img{
  width:100%;height:100%;
  object-fit:contain;
}

/* Brilho pulsante na logo */
.logo-glow{
  position:absolute;inset:-20px;
  background:radial-gradient(circle, rgba(200,160,60,.2) 0%, transparent 70%);
  border-radius:50%;
  animation:glow 2s ease-in-out infinite;
}
@keyframes glow{
  0%,100%{transform:scale(1);opacity:.6;}
  50%{transform:scale(1.15);opacity:1;}
}

/* Título */
.title{
  font-family:'Cinzel',serif;
  font-size:22px;
  font-weight:700;
  letter-spacing:4px;
  color:#8b6414;
  text-transform:uppercase;
  margin-top:16px;
  opacity:0;
  animation:slideUp .7s ease forwards 1.3s;
  text-shadow:0 1px 20px rgba(200,160,60,.3);
}

/* Subtítulo */
.subtitle{
  font-size:12px;
  letter-spacing:5px;
  color:rgba(139,100,20,.55);
  text-transform:uppercase;
  margin-top:5px;
  opacity:0;
  animation:slideUp .7s ease forwards 1.6s;
}

@keyframes slideUp{
  0%{opacity:0;transform:translateY(14px);}
  100%{opacity:1;transform:translateY(0);}
}

/* Divisor ornamental */
.divider{
  display:flex;align-items:center;gap:10px;
  margin-top:22px;
  opacity:0;
  animation:slideUp .7s ease forwards 1.9s;
}
.divider-line{
  width:50px;height:1px;
  background:linear-gradient(90deg,transparent,rgba(200,160,60,.5));
}
.divider-line.right{
  background:linear-gradient(90deg,rgba(200,160,60,.5),transparent);
}
.divider-cross{color:#c8a040;font-size:14px;}

/* Frase do santo */
.quote-wrap{
  max-width:320px;
  text-align:center;
  margin-top:16px;
  opacity:0;
  animation:slideUp .8s ease forwards 2.3s;
  padding:0 20px;
}
.quote-text{
  font-size:16px;
  font-style:italic;
  line-height:1.7;
  color:#5a3a08;
}
.quote-author{
  font-family:'Cinzel',serif;
  font-size:11px;
  letter-spacing:2px;
  color:rgba(139,100,20,.6);
  margin-top:8px;
  text-transform:uppercase;
}

/* Rodapé */
.footer{
  position:fixed;bottom:24px;
  font-size:11px;
  letter-spacing:1px;
  color:rgba(139,100,20,.35);
  font-style:italic;
  opacity:0;
  animation:fadeIn .7s ease forwards 3s;
}

/* Fade out completo */
body.fade-out{
  animation:pageFade .8s ease forwards;
}
@keyframes pageFade{
  to{opacity:0;}
}
</style>
</head>
<body>

<!-- Anéis -->
<div class="ring"></div>
<div class="ring"></div>
<div class="ring"></div>

  document.body.appendChild(p);
}
</script>
